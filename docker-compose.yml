version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wallet_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wallet_db}
      POSTGRES_USER: ${POSTGRES_USER:-wallet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallet_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallet_user} -d ${POSTGRES_DB:-wallet_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wallet_app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-wallet_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-wallet_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-wallet_password}
      - HIKARI_POOL_SIZE=${HIKARI_POOL_SIZE:-20}
      - JPA_DDL_AUTO=${JPA_DDL_AUTO:-validate}
      - LIQUIBASE_ENABLED=${LIQUIBASE_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: